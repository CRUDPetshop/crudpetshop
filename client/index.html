<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Petshop</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🐶 PetMax 🐱</h1>
        </header>

        <nav class="navigation">
            <a href="/" class="nav-link active">🏠 Cadastro de Tutor</a>
            <a href="/" class="nav-link">Cadastro de Pet</a>
        </nav>

        <main>
            <section class="form-section">
                <h2>Adicionar / Editar Tutor</h2>
                
                <form id="userForm">
                    <input type="hidden" id="userId" value="">
                    
                    <div class="form-group">
                        <label for="nome">Nome:</label>
                        <input type="text" id="nome" name="nome" required placeholder="Digite o nome">
                    </div>

                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required placeholder="Digite o email">
                    </div>

                    <div class="form-group">
                        <label for="telefone1">Telefone:</label>
                        <input type="telefone1" id="telefone1" name="telefone1" required placeholder="Digite o telefone">
                    </div>
                    
                    <div class="form-group">
                        <label for="endereco">Endereço:</label>
                        <input type="endereco" id="endereco" name="endereco" required placeholder="Digite o endereco">
                    </div>

                    <div class="form-group">
                        <label for="bairro">Bairro:</label>
                        <input type="bairro" id="bairro" name="bairro" required placeholder="Digite o bairro">
                    </div>

                    <div class="form-group">
                        <label for="cidade">Cidade:</label>
                        <input type="cidade" id="cidade" name="cidade" required placeholder="Digite o cidade">
                    </div>

                    <div class="form-group">
                        <label for="estado">Estado:</label>
                        <input type="estado" id="estado" name="estado" required placeholder="Digite o estado">
                    </div>

                    <div class="form-buttons">
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            Adicionar Pet
                        </button>
                        <button type="button" class="btn btn-secondary" id="cancelBtn" style="display: none;">
                            Cancelar
                        </button>
                    </div>
                </form>
            </section>

            <!-- Lista de usuários -->
            <section class="users-section">
                <div class="section-header">
                    <h2>Lista de Tutores</h2>
                    <button class="btn btn-refresh" id="refreshBtn">🔄 Atualizar</button>
                </div>
                
                <div id="loadingIndicator" class="loading" style="display: none;">
                    Carregando...
                </div>

                <div id="errorMessage" class="error-message" style="display: none;"></div>

                <div id="usersList" class="users-list">
                    <!-- Usuários serão carregados aqui via JavaScript -->
                </div>
            </section>
        </main>

        <footer>
            <p>Projeto IMPACTA</p>
        </footer>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
